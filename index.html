<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدفعة الهندسية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1581094288338-2314dddb7eed') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-bg {
            background: rgba(30, 60, 114, 0.85);
            color: white;
            padding: 30px 0;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
        }
        .term-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border-top: 6px solid #2a5298;
        }
        .material-item {
            background: #f8f9fa;
            border-right: 5px solid #28a745;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-download {
            background-color: #28a745;
            color: white;
            border-radius: 20px;
            padding: 5px 15px;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="header-bg text-center">
        <h1>منصة الدفعة الهندسية</h1>
        <p>المكتبة الرقمية للمواد الدراسية</p>
    </div>

    <div class="container">
        <div class="term-card">
            <h3 class="text-center mb-3">📚 مواد الفصل الدراسي</h3>
            
            <div class="material-item">
                <span>حسبان ٢</span>
                <a href="#" class="btn btn-download">تحميل PDF</a>
            </div>
            <div class="material-item">
                <span>هندسة تحليلية</span>
                <a href="#" class="btn btn-download">تحميل PDF</a>
            </div>
            <div class="material-item">
                <span>رسم هندسي</span>
                <a href="#" class="btn btn-download">https://drive.google.com/file/d/1vFjc7mi58WZ87jOjy3IQR7Ai4c5V0EsT/view?usp=drivesdk</a>
            </div>
            <div class="material-item">
                <span>فيزياء</span>
                <a href="#" class="btn btn-download">تحميل PDF</a>
            </div>
            <div class="material-item">
                <span>أساسيات الورش</span>
                <a href="#" class="btn btn-download">تحميل PDF</a>
            </div>
        </div>
    </div>

    <footer class="text-center text-white mt-4">
        <p>صُنع بكل فخر للدفعة الهندسية © 2026</p>
    </footer>

</body>
</html>
